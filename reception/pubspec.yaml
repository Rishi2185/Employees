name: aarvy_reception
description: "Aarvy reception station — the hospital front-desk desktop app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State & formatting (shared with the patient app's conventions)
  provider: ^6.1.5+1
  google_fonts: ^8.1.0
  intl: ^0.20.2

  # Networking
  dio: ^5.7.0

  # Local durable archive (the permanent long-term record)
  sqflite_common_ffi: ^2.3.4
  path: ^1.9.0
  path_provider: ^2.1.5

  # Settings & token persistence (single trusted station)
  shared_preferences: ^2.5.5

  # Appointment slip printing
  printing: ^5.13.4
  pdf: ^3.11.1

  # Desktop window + file save dialog for backup/export
  window_manager: ^0.4.3
  file_selector: ^1.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
